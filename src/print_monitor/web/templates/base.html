<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}print-monitor-local{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --ink: #e2e8f0; --muted: #94a3b8;
      --accent: #38bdf8; --border: #334155; --row: #172033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.5;
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; gap: 24px; align-items: baseline;
    }
    header h1 { font-size: 18px; margin: 0; }
    header nav a { color: var(--accent); text-decoration: none; margin-right: 16px; }
    main { padding: 24px; max-width: 1080px; margin: 0 auto; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px; margin-bottom: 22px;
    }
    h2 { font-size: 15px; color: var(--muted); text-transform: uppercase;
         letter-spacing: .04em; margin: 0 0 14px; }
    form.filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, select {
      background: var(--row); color: var(--ink); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px; font-size: 14px; min-width: 120px;
    }
    button {
      background: var(--accent); color: #04293a; border: 0; border-radius: 6px;
      padding: 9px 16px; font-weight: 600; cursor: pointer;
    }
    .btn-secondary {
      display: inline-block; background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 6px; padding: 8px 14px;
      text-decoration: none; font-weight: 600;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover { background: var(--row); }
    .kpi { font-size: 30px; font-weight: 700; color: var(--accent); }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 12px 0; }
  </style>
</head>
<body>
  <header>
    <h1>print-monitor-local</h1>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/printers">Impressoras</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
